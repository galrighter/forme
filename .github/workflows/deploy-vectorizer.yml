name: Deploy Vectorizer to Hetzner

# Builds and runs the raster-to-SVG vectorizer container on the Hetzner box.
# Triggers on pushes to main that touch vectorizer/**, or manually.
#
# Required repository secrets:
#   HETZNER_SSH   - the SSH *private key* for the deploy user
#   HETZNER_HOST  - the server hostname or IP
#   HETZNER_USER  - the SSH user (e.g. root or deploy)
# Optional:
#   HETZNER_PORT  - SSH port (defaults to 22)
#
# The box must have Docker installed and the deploy user able to run it.

on:
  push:
    branches: [main]
    paths:
      - "vectorizer/**"
      - ".github/workflows/deploy-vectorizer.yml"
  workflow_dispatch:

concurrency:
  group: deploy-vectorizer
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        env:
          SSH_KEY: ${{ secrets.HETZNER_SSH }}
          HOST: ${{ secrets.HETZNER_HOST }}
          PORT: ${{ secrets.HETZNER_PORT }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${PORT:-22}" -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copy vectorizer to server
        env:
          HOST: ${{ secrets.HETZNER_HOST }}
          USER: ${{ secrets.HETZNER_USER }}
          PORT: ${{ secrets.HETZNER_PORT }}
        run: |
          rsync -az --delete \
            --exclude '.venv' --exclude '__pycache__' --exclude 'out' --exclude 'tmp' \
            -e "ssh -i ~/.ssh/deploy_key -p ${PORT:-22}" \
            vectorizer/ "$USER@$HOST:~/forme-vectorizer/"

      - name: Build and run container (behind Caddy HTTPS)
        env:
          HOST: ${{ secrets.HETZNER_HOST }}
          USER: ${{ secrets.HETZNER_USER }}
          PORT: ${{ secrets.HETZNER_PORT }}
          VTOKEN: ${{ secrets.VECTORIZER_TOKEN }}
          # HTTPS hostname for the vectorizer (Cloudflare Workers can't call raw-IP HTTP).
          VDOMAIN: ${{ vars.VECTORIZER_DOMAIN || 'vec.rmjewel.com' }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "${PORT:-22}" "$USER@$HOST" "VTOKEN='$VTOKEN' VDOMAIN='$VDOMAIN' bash -s" <<'REMOTE'
          set -euo pipefail
          if ! command -v docker >/dev/null 2>&1; then
            echo "Docker not found; installing via get.docker.com"; curl -fsSL https://get.docker.com | sh
          fi
          cd ~/forme-vectorizer
          docker build -t forme-vectorizer .
          docker rm -f forme-vectorizer 2>/dev/null || true
          # bind to localhost only; Caddy terminates TLS and reverse-proxies to it.
          docker run -d --name forme-vectorizer --restart unless-stopped \
            -e VECTORIZER_TOKEN="${VTOKEN:-}" \
            -p 127.0.0.1:8000:8000 forme-vectorizer
          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:8000/api/health >/dev/null 2>&1; then echo "vectorizer healthy"; break; fi
            sleep 2
          done

          # The box already runs nginx (serving another site) on 80/443, so we add
          # an nginx vhost for the vectorizer + a Let's Encrypt cert via certbot.
          # We only ADD a new site file — existing vhosts are untouched.
          if ! command -v certbot >/dev/null 2>&1; then
            apt-get update -qq && apt-get install -y -qq certbot python3-certbot-nginx
          fi
          cat > "/etc/nginx/sites-available/$VDOMAIN" <<EOF
          server {
              listen 80;
              server_name $VDOMAIN;
              client_max_body_size 25m;
              location / {
                  proxy_pass http://127.0.0.1:8000;
                  proxy_set_header Host \$host;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto \$scheme;
                  proxy_read_timeout 300s;
              }
          }
          EOF
          ln -sf "/etc/nginx/sites-available/$VDOMAIN" "/etc/nginx/sites-enabled/$VDOMAIN"
          nginx -t && systemctl reload nginx
          # obtain/install the TLS cert and switch the vhost to HTTPS (idempotent)
          certbot --nginx -d "$VDOMAIN" --non-interactive --agree-tos \
            -m "admin@rmjewel.com" --redirect --keep-until-expiring
          nginx -t && systemctl reload nginx
          echo "verifying HTTPS locally:"; curl -fsS "https://$VDOMAIN/api/health" || (echo "health via HTTPS failed"; exit 1)
          echo "deployed: vectorizer on 127.0.0.1:8000 behind nginx at https://$VDOMAIN"
          REMOTE

      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
