name: Apply Supabase migrations

# מריץ את קובצי supabase/migrations/ מול ה-DB בסדר שמות.
# דורש secret בשם SUPABASE_DB_URL — חובה מחרוזת של ה-SESSION POOLER
# (Connect → Session pooler; host: *.pooler.supabase.com, פורט 5432). זה IPv4.
# אין להשתמש בחיבור הישיר (db.<ref>.supabase.co) — הוא IPv6-only ו-runners של
# GitHub Actions נכשלים עליו עם "Network is unreachable".
# תווים מיוחדים בסיסמה חייבים percent-encoding (למשל ! → %21).
# בלי ה-secret הזה יש להריץ את קובצי ה-SQL ידנית ב-SQL Editor של Supabase.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply migrations with psql
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "::warning::SUPABASE_DB_URL secret is not set — skipping."
            echo "Run the SQL files in supabase/migrations/ manually in the Supabase SQL Editor,"
            echo "or add a SUPABASE_DB_URL secret to enable automatic migration."
            exit 0
          fi
          sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client
          for f in $(ls supabase/migrations/*.sql | sort); do
            echo "Applying $f"
            psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -f "$f"
          done
