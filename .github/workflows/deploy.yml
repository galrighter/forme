name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build (OpenNext for Cloudflare)
        run: npx opennextjs-cloudflare build
      - name: Push runtime secrets to the Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cat > /tmp/secrets.json <<EOF
          {
            "ANTHROPIC_API_KEY": "${{ secrets.ANTHROPIC_API_KEY }}",
            "OPENAI_KEY": "${{ secrets.OPENAI_KEY }}",
            "SUPABASE_URL": "${{ secrets.SUPABASE_URL }}",
            "SUPABASE_SECRET_KEY": "${{ secrets.SUPABASE_SECRET_KEY }}",
            "ADMIN_TOKEN": "${{ secrets.ADMIN_TOKEN }}",
            "LLM_MODEL": "${{ vars.LLM_MODEL || 'claude-sonnet-4-6' }}",
            "OPENAI_MODEL": "${{ vars.OPENAI_MODEL || 'gpt-5.6-luna' }}",
            "LLM_PROVIDER": "${{ vars.LLM_PROVIDER || 'openai' }}",
            "VECTORIZER_URL": "${{ vars.VECTORIZER_URL || 'https://vec.rmjewel.com' }}",
            "VECTORIZER_TOKEN": "${{ secrets.VECTORIZER_TOKEN }}"
          }
          EOF
          npx wrangler versions secret bulk /tmp/secrets.json || npx wrangler secret bulk /tmp/secrets.json
          rm /tmp/secrets.json
      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Temporary: full API request/response trace to diagnose the
          # /zones/.../workers/routes 10000 error. Remove after diagnosis.
          # WRANGLER_LOG_SANITIZE defaults to true, so auth headers are redacted.
          WRANGLER_LOG: debug
        run: npx opennextjs-cloudflare deploy
